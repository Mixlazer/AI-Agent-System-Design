server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/balancer/ {
        proxy_pass http://balancer:8000/;
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        add_header X-Accel-Buffering no;
    }

    location /api/providers/ {
        proxy_pass http://provider-registry:8091/;
    }

    location /api/agents/ {
        proxy_pass http://agent-registry:8090/;
    }

    location /api/guardrails/ {
        proxy_pass http://guardrails:8092/;
    }

    location /api/auth/ {
        proxy_pass http://auth:8093/;
    }
}

