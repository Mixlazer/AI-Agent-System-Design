services:
  # ── Provider 1: Ollama ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "8003:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    # Models configured via .env (PROVIDER_1_MODELS)
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             for model in $$(echo $${PROVIDER_1_MODELS} | tr ',' ' '); do
               ollama pull $$model || true;
             done &&
             tail -f /dev/null"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Provider 2: vLLM ────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    env_file:
      - .env
    environment:
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8002:8000"
    # Model and parameters configured via .env (PROVIDER_2_MODELS)
    command: >
      --model $${PROVIDER_2_MODELS}
      --dtype float16
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --limit-mm-per-prompt image=0,audio=0
      --host 0.0.0.0
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── LLM Balancer ────────────────────────────────────────
  balancer:
    build:
      context: ./balancer
    env_file:
      - .env
    environment:
      # Provider configs loaded from .env
      # PROVIDER_0_* (priority 0), PROVIDER_1_* (priority 1), PROVIDER_2_* (priority 2)
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8000:8000"
      - "9464:9464"
    depends_on:
      vllm:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Observability Stack ──────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./monitoring/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"
      - "8889:8889"
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_AUTO_IMPORT: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  ollama_data:
